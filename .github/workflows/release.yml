name: release

# Build a prebuilt CLI binary on a version tag and publish it as a GitHub
# release, then sync the Homebrew formula. Because users install the binary,
# `brew install` no longer pulls in the Rust toolchain or LLVM (~2 GB).
#
# Apple Silicon only. Intel Macs are not targeted; to add them, restore an
# x86_64-apple-darwin entry (runs-on: macos-13) and an on_intel block below.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build aarch64-apple-darwin
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release -p tensorforge --bin tensorforge --target aarch64-apple-darwin
      - name: Package tarball + checksum
        run: |
          version="${GITHUB_REF_NAME#v}"
          bin="target/aarch64-apple-darwin/release/tensorforge"
          strip "$bin" || true
          tarball="tensorforge-v${version}-aarch64-apple-darwin.tar.gz"
          tar -czf "$tarball" -C "target/aarch64-apple-darwin/release" tensorforge
          shasum -a 256 "$tarball" | tee "${tarball}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: aarch64-apple-darwin
          path: |
            tensorforge-*.tar.gz
            tensorforge-*.sha256

  release:
    name: publish release + tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Render Homebrew formula with real checksum
        run: |
          version="${GITHUB_REF_NAME#v}"
          arm_sha=$(awk '{print $1}' "dist/tensorforge-v${version}-aarch64-apple-darwin.tar.gz.sha256")
          mkdir -p out
          cat > out/tensorforge.rb <<EOF
          class Tensorforge < Formula
            desc "Symbolic tensor algebra for continuum mechanics (.tens DSL)"
            homepage "https://github.com/Chongran-Zhao/TensorForge"
            version "${version}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/Chongran-Zhao/TensorForge/releases/download/v${version}/tensorforge-v${version}-aarch64-apple-darwin.tar.gz"
                sha256 "${arm_sha}"
              end
            end

            def install
              bin.install "tensorforge"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/tensorforge --version")
            end
          end
          EOF
          cat out/tensorforge.rb
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tensorforge-*.tar.gz
            out/tensorforge.rb
      - name: Push formula to Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "No HOMEBREW_TAP_TOKEN secret set — skipping tap update."
            echo "Copy out/tensorforge.rb into Chongran-Zhao/homebrew-tensorforge by hand,"
            echo "or add the secret to automate this step."
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Chongran-Zhao/homebrew-tensorforge.git" tap
          mkdir -p tap/Formula
          cp out/tensorforge.rb tap/Formula/tensorforge.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tensorforge.rb
          git commit -m "tensorforge ${GITHUB_REF_NAME#v}" || { echo "no changes"; exit 0; }
          # HEAD:main works whether the tap repo is empty or already initialized.
          git push origin HEAD:main
