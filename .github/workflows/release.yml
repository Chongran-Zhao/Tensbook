name: release

# Build a prebuilt desktop app DMG on a version tag, publish it as a GitHub
# release, then sync the Homebrew cask tap. Users install the app with one
# Homebrew cask command; installing it does not pull in Rust or LLVM.
#
# Apple Silicon only. Intel Macs are not targeted; to add them, restore an
# x86_64-apple-darwin entry (runs-on: macos-13) and a corresponding cask block.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build aarch64-apple-darwin
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Resolve package version
        id: version
        run: |
          version=$(python3 - <<'PY'
          import json
          import subprocess

          metadata = json.loads(subprocess.check_output(["cargo", "metadata", "--no-deps", "--format-version", "1"]))
          for package in metadata["packages"]:
              if package["name"] == "tensorforge":
                  print(package["version"])
                  break
          else:
              raise SystemExit("tensorforge package not found")
          PY
          )
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked
      - name: Build desktop app
        run: cargo tauri build --target aarch64-apple-darwin
      - name: Package DMG + checksum
        run: |
          version="${{ steps.version.outputs.version }}"
          dmg="TensorForge-v${version}-aarch64-apple-darwin.dmg"
          found=$(find target src-tauri/target -path "*/bundle/dmg/*.dmg" -print 2>/dev/null | head -n 1)
          if [ -z "$found" ]; then
            echo "No Tauri DMG was produced."
            find target src-tauri/target -maxdepth 6 -type f | sort
            exit 1
          fi
          cp "$found" "$dmg"
          shasum -a 256 "$dmg" | tee "${dmg}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: aarch64-apple-darwin
          path: |
            TensorForge-*.dmg
            TensorForge-*.sha256

  release:
    name: publish release + cask tap
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Render Homebrew cask with real checksum
        run: |
          tag="${GITHUB_REF_NAME}"
          dmg=$(ls dist/TensorForge-v*-aarch64-apple-darwin.dmg)
          version="${dmg#dist/TensorForge-v}"
          version="${version%-aarch64-apple-darwin.dmg}"
          dmg_sha=$(awk '{print $1}' "dist/TensorForge-v${version}-aarch64-apple-darwin.dmg.sha256")
          mkdir -p out
          cat > out/tensorforge-cask.rb <<EOF
          cask "tensorforge" do
            version "${version}"
            sha256 "${dmg_sha}"

            url "https://github.com/Chongran-Zhao/TensorForge/releases/download/${tag}/TensorForge-v#{version}-aarch64-apple-darwin.dmg"
            name "TensorForge"
            desc "Symbolic tensor algebra app for continuum mechanics"
            homepage "https://github.com/Chongran-Zhao/TensorForge"

            app "TensorForge.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", "#{appdir}/TensorForge.app"],
                             sudo: false
            end
          end
          EOF
          cat out/tensorforge-cask.rb
      - name: Delete existing mutable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --yes || true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TensorForge-*.dmg
            out/tensorforge-cask.rb
      - name: Push cask to Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "No HOMEBREW_TAP_TOKEN secret set — skipping tap update."
            echo "Copy out/tensorforge-cask.rb into Chongran-Zhao/homebrew-tensorforge by hand,"
            echo "or add the secret to automate this step."
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Chongran-Zhao/homebrew-tensorforge.git" tap
          mkdir -p tap/Casks
          cp out/tensorforge-cask.rb tap/Casks/tensorforge.rb
          cd tap
          git rm -f Formula/tensorforge.rb 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tensorforge.rb
          git commit -m "tensorforge ${GITHUB_REF_NAME#v}" || { echo "no changes"; exit 0; }
          # HEAD:main works whether the tap repo is empty or already initialized.
          git push origin HEAD:main
